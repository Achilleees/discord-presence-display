  <!-- Eye glow: dark rim with subtle lighter center — depth effect -->
  <defs>
    <radialGradient id="innerShadow">
      <stop offset="0%" stop-color="#7B8CFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#3B3F8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2A2D5E" stop-opacity="0.45"/>
    </radialGradient>
  </defs>
